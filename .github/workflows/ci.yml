name: ci
on: [pull_request]
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: cd backend && pip install -r requirements-dev.txt && ruff check . && pytest -m "not postgres"

  backend-postgres:
    runs-on: ubuntu-latest
    services:
      testdb:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: wissen_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d wissen_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: cd backend && pip install -r requirements-dev.txt && pytest -m postgres
        env:
          TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5433/wissen_test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm install && npm run build
